version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: llm_router_db

  qdrant:
    image: qdrant/qdrant

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434 # Connects to your local Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - qdrant